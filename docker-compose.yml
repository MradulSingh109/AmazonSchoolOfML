version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantml_backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/logs:/app/logs
    environment:
      - ENV=production
      - HOST=0.0.0.0
      - PORT=5000
      - LOG_LEVEL=INFO
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantml_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
